spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DATABASE_POOL_SIZE:5}
      minimum-idle: ${DATABASE_MIN_IDLE:1}
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true
    schemas: public
    table: flyway_schema_history
    baseline-version: 0
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION_MS:3600000}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
      cookie:
        domain: ${COOKIE_DOMAIN:}
        secure: true
        http-only: true
        same-site: Lax
        max-age: ${COOKIE_MAX_AGE_SECONDS:2592000}

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html,text/css,application/javascript
    min-response-size: 1024
  error:
    include-message: never
    include-stacktrace: never

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.br.pokefichas: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
