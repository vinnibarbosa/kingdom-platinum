spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pokefichas
    username: postgres
    password: 2011
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: America/Sao_Paulo
          batch_size: 20
          order_inserts: true
          order_updates: true
        cache:
          use_second_level_cache: false
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false
    schemas: public
    table: flyway_schema_history
    baseline-version: 0
    baseline-description: "Initial baseline"
  security:
    jwt:
      secret: pokefichasSecretKeyForLocalDevelopment2025
      expiration: 3600000
      refresh-expiration: 2592000000
      cookie:
        domain:
        secure: false
        http-only: true
        same-site: Lax
        max-age: 2592000

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.br.pokefichas: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    enabled: true

app:
  cors:
    allowed-origin-patterns:
      - http://localhost:4200
      - http://localhost:5173
      - http://localhost:5175
      - http://localhost:8080
